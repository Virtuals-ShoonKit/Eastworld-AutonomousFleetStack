# slam_toolbox async SLAM parameters for Scout Mini UGV.
#
# FAST-LIVO2 owns the map->odom->base_link TF chain.
# transform_publish_period is 0.0 so slam_toolbox does NOT broadcast
# a competing map->odom transform.  It only builds the 2D occupancy grid.

slam_toolbox:
  ros__parameters:
    # --- Frames ---
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan

    # Disable TF publishing — FAST-LIVO2 provides map->odom
    transform_publish_period: 0.0

    # --- Solver ---
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # --- Map ---
    resolution: 0.05
    max_laser_range: 20.0
    minimum_time_interval: 0.5
    map_update_interval: 3.0

    # --- Scan matching ---
    # Disabled: FAST-LIVO2 already provides accurate 3D LIO poses via TF.
    # Letting slam_toolbox do its own 2D scan matching creates a competing
    # pose estimate that causes the occupancy grid to flash/shift.
    use_scan_matching: false
    use_scan_barycenter: true
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # --- Loop closure ---
    # Disabled: FAST-LIVO2's map->odom TF is already globally consistent,
    # so slam_toolbox loop closures would fight the LIO solution.
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03
    loop_search_maximum_distance: 3.0
    do_loop_closing: false
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # --- Travel thresholds ---
    minimum_travel_distance: 0.3
    minimum_travel_heading: 0.3

    # --- Stack / performance ---
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    # --- Misc ---
    use_response_expansion: true
    debug_logging: false
    throttle_scans: 1
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    mode: mapping
