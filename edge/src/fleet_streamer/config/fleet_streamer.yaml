fleet_streamer:
  # Per-robot identity (override via launch arg)
  robot_id: "scout_mini_0"

  # Host fleet server WebSocket URL
  host_url: "ws://192.168.10.120:8800"

  # --- ZED WebRTC settings ---
  zed:
    # Match a mode your camera supports (ZED-M: HD720 is typical). Only one process may open the ZED (not zed_node + zedsrc).
    camera_resolution: 3        # 0=HD2K, 1=HD1080, 3=HD720, 5=VGA
    camera_fps: 30
    stream_type: 0              # 0=Left BGRA
    bitrate: 1500000            # H.264 bitrate (bps)
    iframeinterval: 30          # GOP size (keyframe every N frames)
    idrinterval: 30             # IDR cadence; shorter recovers faster after loss
    queue_max_buffers: 1        # keep latest frame only when downstream is slow
    drop_when_congested: true   # prefer frame drop over added latency
    rtp_mtu: 1200               # safer over VPN/Wi-Fi and avoids fragmentation
    rtp_config_interval: -1     # send SPS/PPS with every IDR for robust joins
    webrtc_latency_ms: 30       # webrtc jitterbuffer target (lower = less delay)

  # --- Pose bridge ---
  pose:
    source_frame: "base_link"
    target_frame: "map"
    rate_hz: 50

  # --- Cloud bridge ---
  cloud:
    input_topic: "/cloud_registered"
    rate_hz: 10                  # throttle to N Hz
    draco_quantization_bits: 11
    use_zstd: false
    cloud_frame: "odom"          # frame the cloud is actually in (LIVO labels it "map")
    map_frame: "map"             # global map frame (from pcd_relocalizer TF)
